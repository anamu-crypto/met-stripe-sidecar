# Alembic configuration.
#
# Most settings (database URL, logging) come from env.py so this file stays
# free of secrets and works the same in dev, CI, and production.

[alembic]
script_location = alembic
prepend_sys_path = src
file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(hour).2d%%(minute).2d-%%(rev)s_%%(slug)s
timezone = UTC
# sqlalchemy.url is set programmatically in alembic/env.py from DATABASE_URL.

[post_write_hooks]
# (No post-write hooks. Run `ruff format` manually if desired.)

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
