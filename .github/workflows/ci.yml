name: ci

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    name: Lint, type-check, and test
    runs-on: ubuntu-latest

    # GitHub Actions provides a Postgres service container. We run migrations
    # against it before the test suite so the migration path is exercised on
    # every PR alongside the app behaviour.
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: sidecar
          POSTGRES_PASSWORD: localdev
          POSTGRES_DB: sidecar
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U sidecar -d sidecar"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql+asyncpg://sidecar:localdev@localhost:5432/sidecar
      STRIPE_WEBHOOK_SECRET: whsec_ci_test_secret
      METRONOME_API_KEY: ci-test-token
      METRONOME_BASE_URL: https://api.metronome.test
      LOG_LEVEL: WARNING

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check src tests

      - name: Type check (mypy, strict)
        run: mypy src

      - name: Run migrations against the service Postgres
        run: alembic upgrade head

      - name: Tests
        run: pytest -v
